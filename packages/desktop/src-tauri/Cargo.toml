[package]
name = "marktext"
version = "0.20.0-dev.1"
description = "MarkText — a simple and elegant open-source markdown editor"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "marktext_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
# `devtools` keeps the webview devtools API (open/close/inspect) available in
# release builds too, not just debug — the View menu exposes it in all builds.
tauri = { version = "2", features = ["macos-private-api", "devtools"] }
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-log = "2"
tauri-plugin-store = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-process = "2"
tauri-plugin-opener = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
fs_extra = "1"
trash = "5"
log = "0.4"
encoding_rs = "0.8"
chardetng = "0.1"
notify-debouncer-full = "0.5"
sys-locale = "0.3"
which = "7"

[target.'cfg(target_os = "macos")'.dependencies]
core-text = "22"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
