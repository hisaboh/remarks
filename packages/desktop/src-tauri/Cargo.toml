[package]
name = "marktext"
version = "0.20.0-dev"
description = "MarkText — a simple and elegant open-source markdown editor"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "marktext_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["macos-private-api"] }
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-log = "2"
tauri-plugin-store = "2"
tauri-plugin-global-shortcut = "2"
tauri-plugin-process = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
fs_extra = "1"
trash = "5"
log = "0.4"
encoding_rs = "0.8"
chardetng = "0.1"
notify-debouncer-full = "0.5"

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
